# Nixpacks configuration for Railway deployment
# https://nixpacks.com/docs

[phases.setup]
nixPkgs = ['nodejs_20', 'openssl']

[phases.install]
cmds = ['npm install --production=false']
dependsOn = ['setup']

[phases.build]
cmds = ['npx prisma generate']
dependsOn = ['install']

[start]
cmd = 'npm start'

[variables]
NODE_ENV = 'production'